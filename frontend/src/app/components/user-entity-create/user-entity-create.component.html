<div class="container">
  <h1>Créer une Association Utilisateur-Entité</h1>

  <div *ngIf="loadingData" class="loading">Chargement des données...</div>

  <div *ngIf="error" class="error">{{ error }}</div>

  <form *ngIf="!loadingData" (ngSubmit)="createUserEntity()" class="form">
    <div class="form-group">
      <label for="userId">Utilisateur :</label>
      <select 
        id="userId" 
        [(ngModel)]="userId" 
        name="userId" 
        required 
        class="form-control"
      >
        <option [ngValue]="0">-- Sélectionner un utilisateur --</option>
        <option *ngFor="let user of users" [ngValue]="user.id">
          {{ user.username }} ({{ user.email }})
        </option>
      </select>
    </div>

    <div class="form-group">
      <label for="entityId">Entité :</label>
      <select 
        id="entityId" 
        [(ngModel)]="entityId" 
        name="entityId" 
        required 
        class="form-control"
      >
        <option [ngValue]="0">-- Sélectionner une entité --</option>
        <option *ngFor="let entity of entities" [ngValue]="entity.id">
          {{ entity.name }}
        </option>
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="loading" class="btn btn-primary">
        {{ loading ? 'Création...' : 'Créer' }}
      </button>
      <a routerLink="/user-entities" class="btn btn-secondary">Annuler</a>
    </div>
  </form>
</div>
