<div class="container">
  <h1>Liste des Utilisateurs</h1>
  
  <a routerLink="/users/create" class="btn btn-primary">Créer un utilisateur</a>

  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="users.length > 0" class="table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nom d'utilisateur</th>
        <th>Email</th>
        <th>Créé le</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.created_at | date:'dd/MM/yyyy HH:mm' }}</td>
        <td class="actions">
          <a [routerLink]="['/users', user.id, 'edit']" class="btn btn-small btn-warning">Modifier</a>
          <button (click)="deleteUser(user.id)" class="btn btn-small btn-danger">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="users.length === 0" class="no-data">
    Aucun utilisateur trouvé
  </div>
</div>
