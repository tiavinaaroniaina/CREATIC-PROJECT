<div class="container">
  <h1>Détails de l'Entité</h1>

  <div *ngIf="loading" class="loading">Chargement...</div>
  
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && entity" class="detail-card">
    <div class="detail-row">
      <span class="label">ID :</span>
      <span class="value">{{ entity.id }}</span>
    </div>
    <div class="detail-row">
      <span class="label">Nom :</span>
      <span class="value">{{ entity.name }}</span>
    </div>
    <div class="detail-row">
      <span class="label">Créé le :</span>
      <span class="value">{{ entity.created_at | date:'dd/MM/yyyy HH:mm:ss' }}</span>
    </div>
    <div class="detail-row">
      <span class="label">Modifié le :</span>
      <span class="value">{{ entity.updated_at | date:'dd/MM/yyyy HH:mm:ss' }}</span>
    </div>

    <div class="actions">
      <a [routerLink]="['/entities', entity.id, 'edit']" class="btn btn-warning">Modifier</a>
      <a routerLink="/entities" class="btn btn-secondary">Retour à la liste</a>
    </div>
  </div>
</div>
