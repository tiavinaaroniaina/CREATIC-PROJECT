<div class="container">
  <h1>Détails de l'Utilisateur</h1>

  <div *ngIf="loading" class="loading">Chargement...</div>
  
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && user" class="detail-card">
    <div class="detail-row">
      <span class="label">ID :</span>
      <span class="value">{{ user.id }}</span>
    </div>
    <div class="detail-row">
      <span class="label">Nom d'utilisateur :</span>
      <span class="value">{{ user.username }}</span>
    </div>
    <div class="detail-row">
      <span class="label">Email :</span>
      <span class="value">{{ user.email }}</span>
    </div>
    <div class="detail-row">
      <span class="label">Créé le :</span>
      <span class="value">{{ user.created_at | date:'dd/MM/yyyy HH:mm:ss' }}</span>
    </div>
    <div class="detail-row">
      <span class="label">Modifié le :</span>
      <span class="value">{{ user.updated_at | date:'dd/MM/yyyy HH:mm:ss' }}</span>
    </div>

    <div class="actions">
      <a [routerLink]="['/users', user.id, 'edit']" class="btn btn-warning">Modifier</a>
      <a routerLink="/users" class="btn btn-secondary">Retour à la liste</a>
    </div>
  </div>
</div>
